name: Deploy dashboard to GitHub Pages

# Deploy-only: this assembles the static site from the committed data/export/
# (no raw FSN/Stooq data is needed in CI). Refresh the data locally with
# `npm run refresh`, commit data/export/, and push — that triggers a redeploy.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; a newer push supersedes an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24" # node:sqlite is available without a flag on Node 24+
          cache: npm
      - run: npm ci
      - name: Assemble static site into dist/
        run: npx tsx src/cli.ts site
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
